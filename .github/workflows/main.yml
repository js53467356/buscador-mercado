name: Wallapop Lavadora relojes Monitor

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Listar archivos (Para estar 100% seguros)
        run: ls -F

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          # Hemos quitado el caché para limpiar errores de rutas antiguas

      - name: Instalar dependencias
        run: npm install

      - name: Ejecutar búsqueda
        run: node index.js
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}

      - name: Guardar historial de búsqueda
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add last_ids.json || exit 0
          git commit -m "Update history: [skip ci]" || exit 0
          git push