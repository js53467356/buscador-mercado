name: Wallapop Lavadora relojes Monitor

on:
  schedule:
    # Se ejecuta cada 30 minutos (puedes ajustarlo)
    - cron: '*/30 * * * *'
  workflow_dispatch: # Permite ejecutarlo manualmente desde la web de GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm install

      - name: Ejecutar búsqueda de Lavadora relojes
        run: node index.js
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}

      - name: Guardar historial de búsqueda (Evitar duplicados)
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add last_ids.json || exit 0
          git commit -m "Update history: [skip ci]" || exit 0
          git push
